name: Release

# Cut a release by pushing a version tag:  git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags: ["v*"]

jobs:
  # ── Standalone FrankenPHP binaries (linux amd64 + arm64), built natively on
  # each architecture's runner and attached to the GitHub Release. ─────────────
  binaries:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build frankenphp-clickhouse (${{ matrix.arch }})
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" \
            -w /work \
            dunglas/frankenphp:builder \
            sh -c '
              export PATH="/usr/local/go/bin:$(go env GOPATH)/bin:/usr/local/bin:/usr/bin:/bin:$PATH" && \
              CGO_ENABLED=0 go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest && \
              CGO_ENABLED=1 \
              XCADDY_GO_BUILD_FLAGS="-tags=nobadger,nomysql,nopgx" \
              CGO_CFLAGS="$(php-config --includes) -D_GNU_SOURCE" \
              CGO_LDFLAGS="$(php-config --ldflags) $(php-config --libs)" \
              xcaddy build \
                --output /work/frankenphp-clickhouse-linux-${{ matrix.arch }} \
                --with github.com/dunglas/frankenphp/caddy \
                --with github.com/jhondermarck/frankenphp-clickhouse/clickhouse-ext=/work/clickhouse-ext
            '

      - name: Checksum
        run: sha256sum "frankenphp-clickhouse-linux-${{ matrix.arch }}" > "frankenphp-clickhouse-linux-${{ matrix.arch }}.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frankenphp-clickhouse-linux-${{ matrix.arch }}
            frankenphp-clickhouse-linux-${{ matrix.arch }}.sha256

  # ── Multi-arch Docker image → GHCR. Each arch builds natively, then a merge
  # step assembles the manifest list (no QEMU emulation of the CGo build). ─────
  image:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform label
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/release/Dockerfile
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: [image]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Create and push manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Word-splitting of the tag flags and digest args is intentional here.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect "ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}"
