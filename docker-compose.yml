# Local development / benchmark stack — NOT a production template.
# The password below is a convenience default for localhost; override it
# (shell or root .env: CLICKHOUSE_PASSWORD=…) and prefer Docker/Compose
# secrets in production. Both containers also run as root here — see
# sample/Dockerfile for a non-root production build.
services:
  frankenphp:
    build:
      context: .
      dockerfile: docker/frankenphp/Dockerfile
    container_name: frankenphp
    ports:
      - "${FRANKENPHP_PORT:-8080}:8080"
    volumes:
      - ./web:/app
    # CH_DSN injected here wins over the bind-mounted /app/.env (Dotenv is
    # immutable) — the host .env targets host-mapped ports, not the
    # in-network clickhouse:9000, so sharing it would break the worker.
    environment:
      - CH_DSN=clickhouse://default:${CLICKHOUSE_PASSWORD:-strongpassword}@clickhouse:9000/events_bench?secure=false&timeout=30s
    command: sh -c '[ -f /app/.env ] || cp /app/.env.example /app/.env && frankenphp run --config /etc/caddy/Caddyfile'
    # Explicit healthcheck: the base image's default probes the Caddy admin API
    # (:2019), which the Caddyfile disables (`admin off`) — so `compose --wait`
    # would never see this service healthy. Probe the app's /healthz instead.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s
    depends_on:
      clickhouse:
        condition: service_healthy

  # ClickHouse Database
  clickhouse:
    # Pinned by default (reproducible benchmarks); CI overrides the tag to run
    # the suite against several ClickHouse versions.
    image: clickhouse/clickhouse-server:${CLICKHOUSE_IMAGE_TAG:-26.5}
    ports:
      # Host ports are overridable (root .env or shell) to coexist with
      # another local ClickHouse already bound to 8123/9000.
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123" # HTTP port
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000" # Native port
    environment:
      - CLICKHOUSE_DB=events_bench
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-strongpassword}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  clickhouse_data:
